<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DealDesk Pro — Deal Analysis Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0D0F14; color: #E8EAF0; min-height: 100vh; }

:root {
  --bg: #0D0F14; --surface: #161921; --surface2: #1E2230;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --accent: #4F8EF7; --accent2: #7B5CF0;
  --green: #34C97D; --amber: #F5A623; --red: #F06054;
  --text: #E8EAF0; --muted: #7A7F96; --dim: #2E3347;
}

.app { display: grid; grid-template-columns: 230px 1fr; min-height: 100vh; }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.logo { padding: 22px 20px 20px; border-bottom: 1px solid var(--border); }
.logo-eyebrow { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 1.8px; text-transform: uppercase; }
.logo-title { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 4px; letter-spacing: -0.3px; }
.logo-title span { color: var(--accent); }
.nav { padding: 12px 0; flex: 1; overflow-y: auto; }
.nav-section { padding: 10px 20px 4px; font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 20px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.12s; border-left: 2px solid transparent; }
.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--accent); background: rgba(79,142,247,0.07); border-left-color: var(--accent); }
.sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--dim); }
.sidebar-footer strong { color: var(--muted); }

.main { overflow-y: auto; min-height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); background: rgba(22,25,33,0.95); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 20; }
.topbar-left h1 { font-size: 15px; font-weight: 600; }
.topbar-left p { font-size: 12px; color: var(--muted); margin-top: 2px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: 1px solid var(--border2); background: transparent; color: var(--text); font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.btn:hover { background: rgba(255,255,255,0.05); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #6AA0F9; border-color: #6AA0F9; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-ghost { border-color: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.btn-danger { border-color: rgba(240,96,84,0.4); color: var(--red); }
.btn-danger:hover { background: rgba(240,96,84,0.08); }
.btn-success { background: var(--green); border-color: var(--green); color: #fff; }
.btn-success:hover { background: #45D98A; }
.btn-icon { padding: 6px; border-radius: 6px; }

.content { padding: 24px 32px 48px; }

/* DEAL CODE */
.deal-header { display: flex; gap: 16px; margin-bottom: 20px; align-items: stretch; }
.deal-code-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 14px 18px; min-width: 170px; display: flex; flex-direction: column; justify-content: center; }
.deal-code-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
.deal-code-val { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; color: var(--accent); margin-top: 5px; }
.deal-created { font-size: 10px; color: var(--dim); margin-top: 5px; font-family: 'DM Mono', monospace; }

/* METRICS */
.metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex: 1; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.9px; }
.metric-value { font-size: 21px; font-weight: 600; margin-top: 6px; font-family: 'DM Mono', monospace; color: var(--text); }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.c-green { color: var(--green); }
.c-amber { color: var(--amber); }
.c-red { color: var(--red); }
.c-blue { color: var(--accent); }
.c-muted { color: var(--muted); }

/* SECTION */
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 13px; font-weight: 600; }
.section-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.section-body { padding: 20px; }

/* APPROVAL TRACK */
.approval-track { display: flex; align-items: flex-start; position: relative; padding: 8px 0; }
.approval-track::before { content: ''; position: absolute; top: 24px; left: 40px; right: 40px; height: 2px; background: var(--dim); z-index: 0; }
.approval-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.step-circle { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--dim); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); transition: all 0.2s; }
.step-circle.done { border-color: var(--green); background: rgba(52,201,125,0.12); color: var(--green); }
.step-circle.active { border-color: var(--accent); background: rgba(79,142,247,0.12); color: var(--accent); box-shadow: 0 0 0 4px rgba(79,142,247,0.1); }
.step-label { text-align: center; font-size: 10px; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.7px; max-width: 80px; line-height: 1.4; }
.step-ts { text-align: center; font-size: 9px; color: var(--dim); margin-top: 4px; font-family: 'DM Mono', monospace; max-width: 90px; line-height: 1.4; }
.step-active-label { color: var(--accent); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.field input, .field select, .field textarea {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
  padding: 9px 12px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.12s; width: 100%;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.field input[readonly] { opacity: 0.45; cursor: not-allowed; }
.field select option { background: #1E2230; }
.field-hint { font-size: 10px; color: var(--dim); margin-top: 3px; }

/* QUOTE TABS */
.quote-tab-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; }
.qtab { padding: 6px 14px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; color: var(--muted); transition: all 0.12s; border: 1px solid transparent; background: transparent; font-family: 'DM Sans', sans-serif; }
.qtab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }
.qtab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* QUOTE TABLE */
.line-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.line-table th { text-align: left; padding: 7px 10px; color: var(--muted); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.line-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.line-table tbody tr:last-child td { border-bottom: none; }
.line-table tfoot td { border-top: 1px solid var(--border2); padding: 9px 10px; }
.line-table input, .line-table select {
  background: var(--surface2); border: 1px solid transparent; border-radius: 5px;
  padding: 5px 8px; font-size: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.12s; width: 100%;
}
.line-table input:focus, .line-table select:focus { border-color: var(--accent); }
.th-right { text-align: right; }
.td-right { text-align: right; }
.mono { font-family: 'DM Mono', monospace; }
.overstd { color: var(--amber); font-size: 10px; }

/* EXCEPTIONS */
.exception-pills { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-exception { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--amber); }
.pill-remove { cursor: pointer; opacity: 0.55; font-size: 14px; line-height: 1; }
.pill-remove:hover { opacity: 1; }

/* EXEC SUMMARY */
.exec-section { border-color: rgba(79,142,247,0.25); }
.exec-header { background: rgba(79,142,247,0.05); }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.summary-rows { display: flex; flex-direction: column; gap: 0; }
.sum-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.sum-row:last-child { border-bottom: none; }
.sum-label { color: var(--muted); }
.sum-val { font-weight: 500; text-align: right; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* STATUS BADGE */
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-draft { background: rgba(122,127,150,0.12); color: var(--muted); border: 1px solid rgba(122,127,150,0.25); }
.badge-pending { background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
.badge-approved { background: rgba(52,201,125,0.1); color: var(--green); border: 1px solid rgba(52,201,125,0.25); }
.badge-escalated { background: rgba(245,166,35,0.1); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }

/* DEAL LIST */
.deal-list-row { display: flex; align-items: center; gap: 16px; padding: 13px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.deal-list-row:hover { background: rgba(255,255,255,0.02); }
.deal-list-row:last-child { border-bottom: none; }
.dlr-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); min-width: 110px; }
.dlr-customer { font-size: 13px; font-weight: 500; flex: 1; }
.dlr-meta { font-size: 11px; color: var(--muted); }
.dlr-tcv { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); min-width: 90px; text-align: right; }
.dlr-margin { font-size: 11px; color: var(--muted); text-align: right; min-width: 60px; }

/* CATALOG TABLE */
.cat-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.cat-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); font-weight: 500; }
.cat-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.cat-table tr:last-child td { border-bottom: none; }

/* SHEETS CONFIG */
.config-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 16px; }
.config-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }

/* AI BADGE */
.ai-badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: rgba(123,92,240,0.12); border: 1px solid rgba(123,92,240,0.25); color: #9B7FFF; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 18px; font-size: 13px; z-index: 999; box-shadow: 0 4px 24px rgba(0,0,0,0.4); display: none; max-width: 320px; }
.toast.show { display: block; }
.toast.success { border-color: rgba(52,201,125,0.4); }
.toast.error { border-color: rgba(240,96,84,0.4); }

.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); }

.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading-bar { height: 2px; background: var(--dim); border-radius: 1px; overflow: hidden; margin-top: 6px; }
.loading-fill { height: 100%; background: var(--accent); border-radius: 1px; width: 0; transition: width 0.3s; }

/* PROGRESS CONNECTOR */
.connector-done { background: var(--green) !important; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-eyebrow">Deal Management</div>
      <div class="logo-title">Deal<span>Desk</span> Pro</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Workspace</div>
      <div class="nav-item active" id="nav-new" onclick="showView('new')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M8 5v6M5 8h6"/></svg>
        New Deal
      </div>
      <div class="nav-item" id="nav-submissions" onclick="showView('submissions')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M3 8h10M3 12h6"/></svg>
        All Deals
      </div>
      <div class="nav-section">Reference</div>
      <div class="nav-item" id="nav-catalog" onclick="showView('catalog')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h12v2H2zM2 7h12v2H2zM2 11h12v2H2z"/></svg>
        Product Catalog
      </div>
      <div class="nav-item" id="nav-terms" onclick="showView('terms')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1zM5 6h6M5 9h4"/></svg>
        Non-Standard Terms
      </div>
      <div class="nav-item" id="nav-tiers" onclick="showView('tiers')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>
        Approval Tiers
      </div>
      <div class="nav-section">Settings</div>
      <div class="nav-item" id="nav-settings" onclick="showView('settings')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M11.8 4.2l-.7.7M4.2 11.8l-.7.7"/></svg>
        Settings
      </div>
    </nav>
    <div class="sidebar-footer">
      v1.0 · <strong>DealDesk Pro</strong>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════════

const PRODUCTS = [
  { sku: 'CYB-ENT-001', name: 'Cybersecurity SaaS — Enterprise',    cat: 'SaaS',  listPrice: 120000, cost: 36000,  stdDiscount: 15, unit: 'Annual' },
  { sku: 'CYB-PRO-002', name: 'Cybersecurity SaaS — Professional',  cat: 'SaaS',  listPrice: 84000,  cost: 25200,  stdDiscount: 15, unit: 'Annual' },
  { sku: 'CYB-STR-003', name: 'Cybersecurity SaaS — Starter',       cat: 'SaaS',  listPrice: 36000,  cost: 10800,  stdDiscount: 10, unit: 'Annual' },
  { sku: 'INC-RET-001', name: 'Incident Retainer — Premium',         cat: 'Retainer', listPrice: 75000, cost: 28000, stdDiscount: 10, unit: 'Annual' },
  { sku: 'INC-RET-002', name: 'Incident Retainer — Standard',        cat: 'Retainer', listPrice: 45000, cost: 18000, stdDiscount: 10, unit: 'Annual' },
  { sku: 'PS-IMP-001',  name: 'PS — Implementation',                 cat: 'Services', listPrice: 25000, cost: 12500, stdDiscount: 5, unit: 'Project' },
  { sku: 'PS-TRN-002',  name: 'PS — Training (per day)',             cat: 'Services', listPrice: 3000,  cost: 1200,  stdDiscount: 5, unit: 'Day' },
  { sku: 'PS-CON-003',  name: 'PS — Consulting (per day)',           cat: 'Services', listPrice: 2200,  cost: 880,   stdDiscount: 0, unit: 'Day' },
];

const NON_STANDARD_TERMS = [
  'Custom SLA (sub-4hr response)',
  'Extended payment terms (60+ days)',
  'Unlimited liability cap',
  'Multi-year price lock',
  'Custom data residency',
  'Source code escrow',
  'Most Favoured Nation (MFN) clause',
  'Audit rights beyond standard',
  'Custom termination for convenience',
  'Discounted renewal commitment',
  'Volume ramp schedule',
  'Custom infosec addendum',
];

const APPROVAL_STAGES = [
  { id: 'submitted',   label: 'Submitted' },
  { id: 'dd_manager',  label: 'Deal Desk Manager' },
  { id: 'director',    label: 'Director' },
  { id: 'finance',     label: 'Finance Sign-off' },
  { id: 'approved',    label: 'Approved' },
];

// Tier logic: returns which stages are required
function getRequiredStages(analysis) {
  const stages = ['submitted', 'dd_manager'];
  if (analysis.blendedDiscount > 15 || analysis.totalTCV > 250000 || analysis.exceptions > 0) stages.push('director');
  if (analysis.blendedDiscount > 30 || analysis.totalTCV > 750000 || analysis.exceptions > 2) stages.push('finance');
  stages.push('approved');
  return stages;
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let SETTINGS = {
  sheetsId: '',
  sheetsTab: 'Deal Submissions',
  apiKey: '',
  oauthToken: '',
};

let deals = [];
let currentView = 'new';
let activeDeal = null;

function newDeal() {
  return {
    code: genCode(),
    customer: '', account: '', owner: '', segment: '', region: '', type: 'New Business',
    quotes: [newQuote(1)],
    activeQuote: 0,
    exceptions: [],
    analysis: '',
    status: 'Draft',
    approvalLog: [],
    createdAt: new Date().toISOString(),
    submittedAt: null,
  };
}

function newQuote(n) {
  return { label: 'Quote ' + n, term: 12, currency: 'GBP', lines: [newLine()] };
}

function newLine() {
  return { sku: '', qty: 1, negotiatedPrice: '' };
}

function genCode() {
  const yr = new Date().getFullYear().toString().slice(2);
  const mo = String(new Date().getMonth() + 1).padStart(2, '0');
  const rnd = Math.floor(Math.random() * 90000) + 10000;
  return `DD-${yr}${mo}-${rnd}`;
}

if (!activeDeal) activeDeal = newDeal();

// ═══════════════════════════════════════════════════════════
// FINANCIAL ENGINE
// ═══════════════════════════════════════════════════════════

function calcLine(line) {
  const prod = PRODUCTS.find(p => p.sku === line.sku);
  if (!prod || !line.qty) return { listTotal: 0, netTotal: 0, cost: 0, gp: 0, margin: 0, discPct: 0, overStd: false };
  const listTotal = prod.listPrice * line.qty;
  const netTotal = line.negotiatedPrice !== '' && line.negotiatedPrice !== null
    ? parseFloat(line.negotiatedPrice) * line.qty
    : listTotal * (1 - prod.stdDiscount / 100);
  const cost = prod.cost * line.qty;
  const gp = netTotal - cost;
  const margin = netTotal > 0 ? gp / netTotal * 100 : 0;
  const discPct = listTotal > 0 ? (1 - netTotal / listTotal) * 100 : 0;
  const overStd = discPct > prod.stdDiscount + 0.1;
  return { listTotal, netTotal, cost, gp, margin, discPct, overStd, prod };
}

function calcQuote(quote) {
  let list = 0, net = 0, cost = 0;
  quote.lines.forEach(l => {
    const c = calcLine(l);
    list += c.listTotal; net += c.netTotal; cost += c.cost;
  });
  const gp = net - cost;
  const margin = net > 0 ? gp / net * 100 : 0;
  const discPct = list > 0 ? (1 - net / list) * 100 : 0;
  const tcv = net * quote.term / 12;
  return { list, net, cost, gp, margin, discPct, tcv };
}

function calcDeal(deal) {
  let totalList = 0, totalNet = 0, totalCost = 0, totalTCV = 0;
  let stdDiscWeighted = 0, stdDiscLines = 0;
  deal.quotes.forEach(q => {
    const qt = calcQuote(q);
    totalList += qt.list; totalNet += qt.net; totalCost += qt.cost; totalTCV += qt.tcv;
    q.lines.forEach(l => {
      const prod = PRODUCTS.find(p => p.sku === l.sku);
      if (prod) { stdDiscWeighted += prod.stdDiscount; stdDiscLines++; }
    });
  });
  const totalGP = totalNet - totalCost;
  const margin = totalNet > 0 ? totalGP / totalNet * 100 : 0;
  const blendedDiscount = totalList > 0 ? (1 - totalNet / totalList) * 100 : 0;
  const stdDiscAvg = stdDiscLines > 0 ? stdDiscWeighted / stdDiscLines : 0;
  const exceptions = deal.exceptions.length;
  const requiredStages = getRequiredStages({ blendedDiscount, totalTCV, exceptions });
  const peakApproval = requiredStages.includes('finance') ? 'Finance Sign-off'
    : requiredStages.includes('director') ? 'Director'
    : 'Deal Desk Manager';
  const tierColor = requiredStages.includes('finance') ? 'var(--red)'
    : requiredStages.includes('director') ? 'var(--amber)' : 'var(--green)';
  return { totalList, totalNet, totalCost, totalGP, margin, blendedDiscount, stdDiscAvg, totalTCV, exceptions, requiredStages, peakApproval, tierColor };
}

// FORMATTING

function fmt(n, currency = 'GBP') {
  if (isNaN(n) || n === null) return '—';
  const sym = currency === 'USD' ? '$' : currency === 'EUR' ? '€' : '£';
  return sym + Math.round(n).toLocaleString('en-GB');
}

function fmtPct(n) { return isNaN(n) ? '—' : n.toFixed(1) + '%'; }
function fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function marginClass(m) { return m < 40 ? 'c-red' : m < 55 ? 'c-amber' : 'c-green'; }
function discClass(d) { return d > 30 ? 'c-red' : d > 15 ? 'c-amber' : 'c-green'; }

function showView(v) {
  currentView = v;
  ['new','submissions','catalog','terms','tiers','settings'].forEach(k => {
    const el = document.getElementById('nav-' + k);
    if (el) el.classList.toggle('active', k === v);
  });
  render();
}

function render() {
  const main = document.getElementById('main');
  if (currentView === 'new')         main.innerHTML = renderNewDeal();
  else if (currentView === 'submissions') main.innerHTML = renderSubmissions();
  else if (currentView === 'catalog')     main.innerHTML = renderCatalog();
  else if (currentView === 'terms')       main.innerHTML = renderTerms();
  else if (currentView === 'tiers')       main.innerHTML = renderTiersView();
  else if (currentView === 'settings')    main.innerHTML = renderSettings();
}

function renderApprovalTrack(d, an) {
  const required = an.requiredStages;
  const allStages = APPROVAL_STAGES.filter(s => required.includes(s.id));
  const completedIds = d.approvalLog.map(l => l.stage);
  const activeIdx = completedIds.length < allStages.length ? completedIds.length : allStages.length;

  // Build connector line dynamically
  const pct = allStages.length > 1 ? (completedIds.length / (allStages.length - 1)) * 100 : 0;

  return `
  <div style="position:relative;">
    <div style="position:absolute;top:16px;left:5%;right:5%;height:2px;background:var(--dim);z-index:0;border-radius:1px;">
      <div style="height:100%;width:${Math.min(pct,100)}%;background:var(--green);border-radius:1px;transition:width 0.4s;"></div>
    </div>
    <div class="approval-track">
      ${allStages.map((s, i) => {
        const log = d.approvalLog.find(l => l.stage === s.id);
        const done = !!log;
        const active = !done && i === activeIdx;
        return `<div class="approval-step">
          <div class="step-circle ${done?'done':active?'active':''}">${done?'✓':(i+1)}</div>
          <div class="step-label ${active?'step-active-label':''}">${s.label}</div>
          <div class="step-ts">${log ? fmtTs(log.ts) : active ? 'Awaiting' : ''}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════

function upd(key, val) { activeDeal[key] = val; render(); }
function updQuote(qi, key, val) { activeDeal.quotes[qi][key] = val; render(); }
function updLine(qi, li, key, val) { activeDeal.quotes[qi].lines[li][key] = val; render(); }
function switchQuote(i) { activeDeal.activeQuote = i; render(); }
function addQuote() {
  activeDeal.quotes.push(newQuote(activeDeal.quotes.length + 1));
  activeDeal.activeQuote = activeDeal.quotes.length - 1;
  render();
}
function removeQuote(i) {
  if (activeDeal.quotes.length <= 1) return;
  activeDeal.quotes.splice(i, 1);
  activeDeal.activeQuote = Math.max(0, i - 1);
  render();
}
function addLine(qi) { activeDeal.quotes[qi].lines.push(newLine()); render(); }
function removeLine(qi, li) {
  if (activeDeal.quotes[qi].lines.length <= 1) return;
  activeDeal.quotes[qi].lines.splice(li, 1);
  render();
}
function addException(val) {
  if (val && !activeDeal.exceptions.includes(val)) { activeDeal.exceptions.push(val); render(); }
}
function removeException(val) { activeDeal.exceptions = activeDeal.exceptions.filter(e => e !== val); render(); }

function resetDeal() {
  if (confirm('Reset the current deal form? All unsaved data will be lost.')) { activeDeal = newDeal(); render(); }
}

function openDeal(code) {
  const d = deals.find(x => x.code === code);
  if (d) { activeDeal = JSON.parse(JSON.stringify(d)); showView('new'); }
}

// ─── SUBMIT ────────────────────────────────────────────────────────────────

async function submitDeal() {
  const d = activeDeal;
  if (!d.customer.trim()) { toast('Please enter a customer name.', 'error'); return; }
  if (!d.owner.trim()) { toast('Please enter a deal owner.', 'error'); return; }
  const an = calcDeal(d);
  if (an.totalNet === 0) { toast('Please add at least one product line with a price.', 'error'); return; }

  d.status = 'Pending Approval';
  d.submittedAt = new Date().toISOString();
  d.approvalLog = [{ stage: 'submitted', ts: new Date().toISOString(), by: d.owner }];

  const dealCopy = JSON.parse(JSON.stringify(d));
  deals.push(dealCopy);

  // Write to Google Sheets
  if (SETTINGS.sheetsId && SETTINGS.oauthToken) {
    await writeToSheets(dealCopy, an);
  } else {
    toast('Deal ' + d.code + ' submitted. Configure Google Sheets in Settings to enable auto-save.', 'success');
  }

  activeDeal = newDeal();
  render();
}

async function writeToSheets(d, an) {
  const row = [
    new Date().toLocaleString('en-GB'),
    d.code,
    d.customer,
    d.account,
    d.owner,
    d.type,
    d.segment,
    d.region,
    d.quotes.length,
    Math.round(an.totalNet),
    Math.round(an.totalTCV),
    Math.round(an.totalList),
    an.blendedDiscount.toFixed(1),
    an.margin.toFixed(1),
    Math.round(an.totalGP),
    d.exceptions.join('; '),
    an.peakApproval,
    d.analysis,
    d.status,
  ];

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SETTINGS.sheetsId}/values/${encodeURIComponent(SETTINGS.sheetsTab + '!A:S')}:append?valueInputOption=RAW`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + SETTINGS.oauthToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] }),
    });
    if (res.ok) {
      toast('Deal ' + d.code + ' submitted and saved to Google Sheets ✓', 'success');
    } else {
      const err = await res.json();
      toast('Submitted locally. Sheets error: ' + (err.error?.message || 'Unknown'), 'error');
    }
  } catch (e) {
    toast('Submitted locally. Could not reach Google Sheets: ' + e.message, 'error');
  }
}

async function testSheetsConnection() {
  const result = document.getElementById('sheets-test-result');
  if (!SETTINGS.sheetsId || !SETTINGS.oauthToken) {
    result.innerHTML = '<span style="color:var(--red);">Please enter Sheet ID and OAuth token first.</span>';
    return;
  }
  result.innerHTML = '<span style="color:var(--muted);">Testing...</span>';
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SETTINGS.sheetsId}?fields=properties.title`;
  try {
    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + SETTINGS.oauthToken } });
    const data = await res.json();
    if (res.ok) {
      result.innerHTML = `<span style="color:var(--green);">✓ Connected to: <strong>${data.properties?.title}</strong></span>`;
    } else {
      result.innerHTML = `<span style="color:var(--red);">Error: ${data.error?.message}</span>`;
    }
  } catch (e) {
    result.innerHTML = `<span style="color:var(--red);">Connection failed: ${e.message}</span>`;
  }
}

function saveSettings() { toast('Settings saved.', 'success'); }

// ─── AI ANALYSIS GENERATION ────────────────────────────────────────────────

async function generateAnalysis() {
  const d = activeDeal;
  const an = calcDeal(d);
  if (!d.customer) { toast('Enter customer name first.', 'error'); return; }

  const btn = document.getElementById('ai-gen-btn');
  const loading = document.getElementById('ai-loading');
  const fill = document.getElementById('loading-fill');
  const textarea = document.getElementById('f-analysis');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  loading.style.display = 'block';

  let prog = 0;
  const interval = setInterval(() => { prog = Math.min(prog + 8, 85); if (fill) fill.style.width = prog + '%'; }, 200);

  const prompt = `You are a Deal Desk analyst. Write a concise, executive-level deal analysis commentary (3-4 short paragraphs) for an approver. Be direct, professional, and data-driven.

Deal Details:
- Customer: ${d.customer} (${d.segment || 'unspecified segment'}, ${d.region || 'unspecified region'})
- Deal Type: ${d.type}
- Quotes: ${d.quotes.length} (${d.quotes.map(q => q.label + ': ' + q.term + 'mo').join(', ')})
- Net ARR: £${Math.round(an.totalNet).toLocaleString('en-GB')}
- Total TCV: £${Math.round(an.totalTCV).toLocaleString('en-GB')}
- List Value: £${Math.round(an.totalList).toLocaleString('en-GB')}
- Blended Discount: ${an.blendedDiscount.toFixed(1)}% (standard avg: ${an.stdDiscAvg.toFixed(1)}%)
- Gross Margin: ${an.margin.toFixed(1)}%
- Deal Exceptions: ${d.exceptions.length > 0 ? d.exceptions.join('; ') : 'None'}
- Required Approval: ${an.peakApproval}

Write the analysis covering: commercial overview, discount/margin assessment, exception rationale if any, strategic fit, and a clear recommendation. Do not use bullet points. Write in flowing paragraphs. Keep it under 200 words.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    clearInterval(interval);
    if (fill) fill.style.width = '100%';

    const text = data.content?.find(c => c.type === 'text')?.text || '';
    if (text && textarea) {
      textarea.value = text;
      activeDeal.analysis = text;
    }
  } catch (e) {
    clearInterval(interval);
    toast('Could not generate analysis: ' + e.message, 'error');
  }

  setTimeout(() => {
    if (loading) loading.style.display = 'none';
    if (fill) fill.style.width = '0';
    if (btn) { btn.disabled = false; btn.innerHTML = 'Generate Draft ↗'; }
    render();
  }, 600);
}

// ─── TOAST ─────────────────────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  setTimeout(() => { el.classList.remove('show'); }, 4000);
}

render();
</script>
